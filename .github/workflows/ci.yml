name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: assetflow
          POSTGRES_PASSWORD: assetflow_test
          POSTGRES_DB: assetflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://assetflow:assetflow_test@localhost:5432/assetflow_test?schema=public
      DIRECT_URL: postgresql://assetflow:assetflow_test@localhost:5432/assetflow_test?schema=public
      BETTER_AUTH_SECRET: ci_test_secret_not_for_production_use_only
      BETTER_AUTH_URL: http://localhost:3000
      CRON_SECRET: ci_test_cron_secret_16

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Enable btree_gist on test database
        run: |
          PGPASSWORD=assetflow_test psql -h localhost -U assetflow -d assetflow_test \
            -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
